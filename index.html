<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#fff;color:#173404}
::-webkit-scrollbar{height:4px;width:4px}
::-webkit-scrollbar-thumb{background:#C0DD97;border-radius:2px}

/* ── STAGE BUTTONS ─────────────────────────────────────────── */
.stage-btn{cursor:pointer;transition:all 0.15s;border:1.5px solid #C0DD97;border-radius:10px;background:#fff;padding:10px 11px;width:126px;min-width:126px;display:flex;flex-direction:column;gap:4px;text-align:left}
.stage-btn:hover{border-color:#639922;background:#EAF3DE}
.stage-btn.active{border-color:#3B6D11;background:#EAF3DE;box-shadow:0 0 0 3px #C0DD9750}

/* ── NAV & TABS ─────────────────────────────────────────────── */
.nav-btn{padding:8px 16px;font-size:12px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#639922;white-space:nowrap;transition:all 0.1s;font-family:inherit}
.nav-btn.on{color:#173404;border-bottom-color:#3B6D11;font-weight:500}
.nav-btn:hover{color:#3B6D11}
.tab-btn{flex:1;padding:7px 3px;font-size:10px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#639922;transition:all 0.1s;font-family:inherit}
.tab-btn.on{color:#173404;border-bottom-color:#3B6D11;font-weight:500}
.cat-btn{font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid #C0DD97;background:#fff;color:#3B6D11;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all 0.1s}
.cat-btn.on{background:#3B6D11;color:#EAF3DE;border-color:#3B6D11}
.cat-btn:hover{border-color:#639922}

/* ── INPUTS ─────────────────────────────────────────────────── */
.search-inp{width:100%;border:1px solid #C0DD97;border-radius:8px;padding:8px 12px;font-size:12px;outline:none;background:#fff;color:#27500A;font-family:inherit}
.search-inp:focus{border-color:#3B6D11;box-shadow:0 0 0 2px #C0DD9750}
.add-inp{flex:1;border:1px solid #C0DD97;border-radius:7px;padding:6px 9px;font-size:11px;outline:none;background:#fff;color:#27500A;font-family:inherit}
.add-inp:focus{border-color:#3B6D11;box-shadow:0 0 0 2px #C0DD9750}
.add-inp::placeholder,.search-inp::placeholder{color:#97C459}
.add-btn{background:#3B6D11;color:#EAF3DE;border:none;border-radius:7px;padding:6px 11px;font-size:11px;cursor:pointer;font-weight:500;white-space:nowrap;font-family:inherit;transition:background 0.1s}
.add-btn:hover{background:#27500A}
.del-btn{background:none;border:none;cursor:pointer;color:#97C459;font-size:15px;padding:0 4px;line-height:1;flex-shrink:0;transition:color 0.1s}
.del-btn:hover{color:#E24B4A}

/* ── CHECKLIST ───────────────────────────────────────────────── */
.check-row{display:flex;gap:8px;align-items:flex-start;padding:8px 10px;border-radius:7px;cursor:pointer;border:1px solid #C0DD97;background:#fff;transition:all 0.12s}
.check-row:hover{background:#EAF3DE;border-color:#639922}
.check-row.done{background:#EAF3DE;opacity:0.65}
.check-box{width:15px;height:15px;min-width:15px;border-radius:4px;border:1.5px solid #97C459;background:#fff;display:flex;align-items:center;justify-content:center;margin-top:1px;flex-shrink:0}
.check-box.on{background:#3B6D11;border-color:#3B6D11}

/* ── MISC ────────────────────────────────────────────────────── */
.badge{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid #C0DD97;background:#EAF3DE;color:#27500A;font-weight:500;white-space:nowrap}
.pill{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid #C0DD97;background:#EAF3DE;color:#3B6D11}
.sec-lbl{font-size:10px;font-weight:500;color:#639922;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.item-row{display:flex;gap:9px;align-items:flex-start;padding:8px 10px;border-radius:8px;background:#EAF3DE;border:1px solid #C0DD97}
.dot{width:6px;height:6px;min-width:6px;border-radius:50%;background:#3B6D11;margin-top:4px;flex-shrink:0}
.note{padding:8px 10px;background:#fff;border:1px solid #97C459;border-left:3px solid #3B6D11;border-radius:7px;font-size:11px;color:#27500A;line-height:1.5}
.warn{padding:8px 10px;background:#fffbeb;border:1px solid #C0DD97;border-left:3px solid #BA7517;border-radius:7px;font-size:11px;color:#633806;line-height:1.5}
.concept-card{background:#fff;border:1px solid #C0DD97;border-radius:9px;padding:11px 13px;display:flex;flex-direction:column;gap:4px}
.concept-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:#EAF3DE;border:1px solid #C0DD97;color:#639922;align-self:flex-start}
.tool-card{background:#fff;border:1.5px solid #C0DD97;border-radius:10px;padding:13px 14px;display:flex;flex-direction:column;gap:6px;cursor:pointer;transition:border-color 0.12s}
.tool-card:hover{border-color:#639922}
.tool-card.open{border-color:#3B6D11;background:#EAF3DE}
.add-row{display:flex;gap:6px;align-items:center}
</style>

const INIT_CONCEPTS=[
{id:1,term:"SAFE",cat:"Inversión",def:"Simple Agreement for Future Equity. Acuerdo de inversión que permite a las startups obtener capital ahora con la promesa de dar acciones en una ronda futura. Creado por Y Combinator."},
{id:2,term:"MOIC",cat:"Generales",def:"Multiple on Invested Capital. Mide cuántas veces se multiplicó el capital invertido. Ej: MOIC de 3x significa que se recuperó 3 veces lo invertido."},
{id:3,term:"IRR",cat:"Generales",def:"Internal Rate of Return (Tasa Interna de Retorno). Mide la rentabilidad anualizada de una inversión considerando el tiempo en que se obtuvo el retorno."},
{id:4,term:"ARR",cat:"SaaS",def:"Annual Recurring Revenue. Ingresos recurrentes anuales de una empresa SaaS. Métrica central para evaluar el tamaño y crecimiento de un negocio de suscripción."},
{id:5,term:"MRR",cat:"SaaS",def:"Monthly Recurring Revenue. Ingresos recurrentes mensuales. ARR = MRR × 12."},
{id:6,term:"GTM",cat:"Generales",def:"Go-to-Market. Estrategia que define cómo una empresa llevará su producto al mercado y llegará a sus clientes objetivo."},
{id:7,term:"PMF",cat:"Generales",def:"Product-Market Fit. El punto donde el producto satisface una necesidad real del mercado de forma que genera tracción orgánica y retención."},
{id:8,term:"TAM",cat:"Mercado",def:"Total Addressable Market. El mercado total disponible si se captura el 100% de los clientes potenciales. Representa el techo máximo de la oportunidad."},
{id:9,term:"SAM",cat:"Mercado",def:"Serviceable Available Market. La parte del TAM que la empresa puede alcanzar con su modelo de negocio y geografía actuales."},
{id:10,term:"SOM",cat:"Mercado",def:"Serviceable Obtainable Market. La porción del SAM que la empresa puede capturar de forma realista en el corto/mediano plazo."},
{id:11,term:"TTV",cat:"SaaS",def:"Time to Value. Tiempo que tarda un cliente en experimentar el valor prometido del producto. Un TTV corto indica una buena experiencia de onboarding."},
{id:12,term:"Lead Investor",cat:"Inversión",def:"Inversor principal que aporta el mayor capital y negocia todos los términos de una ronda. Actúa como ancla de confianza para atraer a los demás inversores."},
{id:13,term:"Cap Table",cat:"Inversión",def:"Tabla de capitalización. Muestra la estructura de propiedad de una empresa: quién posee qué porcentaje de acciones y a qué precio."},
{id:14,term:"CAC",cat:"SaaS",def:"Customer Acquisition Cost. Costo promedio de adquirir un nuevo cliente, incluyendo marketing y ventas."},
{id:15,term:"Aceleradora",cat:"Ecosistema",def:"Organización que proporciona capital semilla, mentoría y redes de contacto para startups en etapa temprana durante un período limitado (3 a 6 meses). Ej: YC, Platanus, StartupChile."},
{id:16,term:"Burn Rate",cat:"Generales",def:"Cuánto dinero en efectivo gasta una startup cada mes. Net Burn = Gasto total mensual menos los ingresos mensuales."},
{id:17,term:"Notas Convertibles",cat:"Inversión",def:"Instrumentos de deuda que se convierten en acciones en una futura ronda de financiamiento, generalmente con un descuento o valuation cap."},
{id:18,term:"Vesting",cat:"Inversión",def:"Proceso por el cual los founders o empleados adquieren progresivamente el derecho de propiedad sobre sus acciones a lo largo del tiempo."},
{id:19,term:"Cliff",cat:"Inversión",def:"Período mínimo que debes trabajar antes de recibir cualquier acción. Ejemplo: cliff de 1 año — si te vas al mes 11, no recibes nada; al mes 12, recibes todo lo acumulado."},
{id:20,term:"ESOP",cat:"Inversión",def:"Employee Stock Option Plan. Plan que otorga a los empleados el derecho a comprar acciones de la empresa a un precio fijo (strike price) en el futuro."},
{id:21,term:"Pro-rata Rights",cat:"Inversión",def:"Derecho del inversor a participar en rondas futuras manteniendo su porcentaje de participación para no diluirse. Común en term sheets de fondos VC."},
{id:22,term:"Liquidation Preference",cat:"Inversión",def:"En caso de venta de la empresa, los inversores cobran antes que los empleados y founders. Define el orden y monto de distribución de los retornos."},
{id:23,term:"ROFR",cat:"Inversión",def:"Right of First Refusal. Derecho contractual que da prioridad a su titular para comprar un activo antes de que el propietario pueda venderlo a un tercero."},
{id:24,term:"LPA",cat:"Inversión",def:"Limited Partnership Agreement. Contrato que regula la relación entre los LPs (inversores del fondo) y el GP (quien gestiona el fondo)."},
{id:25,term:"Cayman Sandwich",cat:"Legal",def:"Estructura legal de tres capas para startups latinoamericanas: holding en Islas Caimán, LLC en Delaware y sociedad operativa en LATAM. Estándar que los fondos VC conocen y aceptan."},
{id:26,term:"Moat",cat:"Generales",def:"Ventaja competitiva sostenible. Similar a un foso alrededor de un castillo: hace difícil que los competidores repliquen el negocio."},
{id:27,term:"White-label",cat:"Generales",def:"Producto fabricado por una empresa y vendido a otra, que lo renombra y comercializa bajo su propia marca."},
{id:28,term:"Escrow",cat:"Legal",def:"Depósito en garantía. Servicio donde un tercero neutro guarda fondos o documentos hasta que se cumplan las condiciones acordadas. Común en cierres de inversión."},
{id:29,term:"Take Rate",cat:"Marketplace",def:"Porcentaje de ingresos que una plataforma se queda de cada transacción que facilita. Métrica central para evaluar marketplaces."},
{id:30,term:"GMV",cat:"Marketplace",def:"Gross Merchandise Value. Valor total de todos los bienes vendidos en una plataforma antes de restar gastos, descuentos o devoluciones."},
{id:31,term:"ARPU",cat:"SaaS",def:"Average Revenue Per User. Ingreso promedio por usuario. Útil para comparar eficiencia de monetización."},
{id:32,term:"ARPA",cat:"SaaS",def:"Average Revenue Per Account. Similar al ARPU pero por cuenta (empresa), usado en modelos B2B."},
{id:33,term:"KYC",cat:"Fintech",def:"Know Your Customer. Proceso de verificación de identidad de los clientes, requerido por regulaciones financieras para prevenir fraude y lavado de dinero."},
{id:34,term:"Open Banking",cat:"Fintech",def:"Sistema que permite a terceros autorizados por el cliente acceder de forma segura a la información bancaria mediante APIs."},
{id:35,term:"Embedded Finance",cat:"Fintech",def:"Integración de servicios financieros (pagos, préstamos, seguros) directamente dentro de productos de empresas no financieras."},
{id:36,term:"Stablecoins",cat:"Fintech",def:"Criptomonedas diseñadas para tener un valor estable, vinculando su precio a un activo externo (dólar, euro, oro) para reducir la volatilidad."},
{id:37,term:"ROAS",cat:"Generales",def:"Return on Advertising Spend. Cuánto ingreso genera cada peso/dólar invertido en publicidad."},
{id:38,term:"Moral Hazard",cat:"Generales",def:"Riesgo moral. Ocurre cuando alguien asume más riesgos porque sabe que otra entidad asumirá las consecuencias negativas. Genera incentivos desalineados."},
{id:39,term:"Scrum / Kanban",cat:"Operaciones",def:"Scrum: marco ágil que organiza el trabajo en sprints. Kanban: metodología visual que gestiona el flujo de trabajo con tableros y limita las tareas en curso."},
{id:40,term:"PUDO",cat:"Logística",def:"Pick-Up and Drop-Off. Punto donde los clientes recogen o dejan paquetes u órdenes. Relevante en startups de logística y e-commerce."},
];

function useAITasks(all){
  const init={};
  all.forEach(s=>{init[s.id]=s.ai.map(t=>({text:t,done:false}));});
  const [tasks,setT]=useState(init);
  const toggle=(sid,i)=>setT(p=>{const a=[...(p[sid]||[])];a[i]={...a[i],done:!a[i].done};return{...p,[sid]:a};});
  const add=(sid,text)=>{if(!text.trim())return;setT(p=>({...p,[sid]:[...(p[sid]||[]),{text:text.trim(),done:false}]}));};
  const getSorted=sid=>{const a=(tasks[sid]||[]).map((t,i)=>({...t,i}));return[...a.filter(t=>!t.done),...a.filter(t=>t.done)];};
  return{toggle,add,getSorted};
}

function AITab({s,toggle,add,getSorted}){
  const [newT,setNewT]=useState("");
  const sorted=getSorted(s.id);
  const done=sorted.filter(t=>t.done).length;
  const tot=sorted.length;
  const pct=tot>0?Math.round(done/tot*100):0;
  const submit=()=>{if(newT.trim()){add(s.id,newT);setNewT("");}};
  return h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
    tot>0&&h("div",{style:{padding:"8px 10px",background:"#EAF3DE",border:"1px solid #C0DD97",borderRadius:7,display:"flex",gap:8,alignItems:"center"}},
      h("span",{style:{flex:1,fontSize:11,color:"#27500A",fontWeight:500}},tot+" tareas · "+done+"/"+tot+" completadas"),
      h("div",{style:{display:"flex",alignItems:"center",gap:5}},
        h("div",{style:{height:4,width:60,background:"#C0DD97",borderRadius:2,overflow:"hidden"}},
          h("div",{style:{width:pct+"%",height:"100%",background:"#3B6D11",borderRadius:2,transition:"width 0.3s"}})
        ),
        h("span",{style:{fontSize:10,color:"#27500A",fontWeight:500}},pct+"%")
      )
    ),
    h("div",{className:"add-row"},
      h("input",{className:"add-inp",placeholder:"Agregar nueva tarea de automatización...",value:newT,onChange:e=>setNewT(e.target.value),onKeyDown:e=>{if(e.key==="Enter")submit();}}),
      h("button",{className:"add-btn",onClick:submit},"+ Agregar")
    ),
    sorted.filter(t=>!t.done).length>0&&h("div",{className:"sec-lbl"},"Pendientes ("+sorted.filter(t=>!t.done).length+")"),
    ...sorted.filter(t=>!t.done).map(t=>h("div",{key:t.i,className:"check-row",onClick:()=>toggle(s.id,t.i)},
      h("div",{className:"check-box"}),
      h("span",{style:{fontSize:11,color:"#173404",lineHeight:1.5}},t.text)
    )),
    done>0&&h("div",{className:"sec-lbl",style:{marginTop:4}},"Completadas ("+done+")"),
    ...sorted.filter(t=>t.done).map(t=>h("div",{key:t.i,className:"check-row done",onClick:()=>toggle(s.id,t.i)},
      h("div",{className:"check-box on"},h(CheckIcon)),
      h("span",{style:{fontSize:11,color:"#639922",lineHeight:1.5,textDecoration:"line-through"}},t.text)
    )),
    tot===0&&h("div",{style:{fontSize:11,color:"#97C459",padding:"10px",textAlign:"center"}},"No hay automatizaciones registradas para esta etapa.")
  );
}

function Panel({s,onClose,toggle,add,getSorted}){
  const [tab,setTab]=useState("overview");
  const tabs=[["overview","Resumen"],["tasks","Tareas"],["ai","Automatización IA"],["tools","Herramientas"]];
  return h("div",{style:{width:360,minWidth:360,borderLeft:"1.5px solid #C0DD97",background:"#fff",display:"flex",flexDirection:"column",height:"100%"}},
    h("div",{style:{padding:"13px 15px 10px",borderBottom:"1.5px solid #C0DD97",background:"#EAF3DE",flexShrink:0}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
        h("div",null,
          h("div",{style:{fontSize:14,fontWeight:500,color:"#173404"}},s.name),
          h("div",{style:{fontSize:11,color:"#3B6D11",marginTop:2}},s.sub)
        ),
        h("button",{onClick:onClose,style:{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#639922",lineHeight:1,padding:0,fontFamily:"inherit"}},"×")
      ),
      h("div",{style:{marginTop:7,display:"flex",gap:5,flexWrap:"wrap"}},
        ...s.resp.map(r=>h("span",{key:r,className:"badge"},r))
      )
    ),
    h("div",{style:{display:"flex",borderBottom:"1.5px solid #C0DD97",flexShrink:0}},
      ...tabs.map(([id,lbl])=>h("button",{key:id,className:"tab-btn"+(tab===id?" on":""),onClick:()=>setTab(id)},lbl))
    ),
    h("div",{style:{padding:"13px 15px",flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:12}},
      tab==="overview"&&[
        h("p",{key:"d",style:{margin:0,fontSize:12,color:"#173404",lineHeight:1.7}},s.desc),
        s.notes&&h("div",{key:"n",className:"note"},s.notes),
        h("div",{key:"ev"},
          h("div",{className:"sec-lbl"},"Eventos registrables"),
          h("div",null,...s.events.map((e,i)=>h("div",{key:i,style:{display:"flex",gap:7,alignItems:"flex-start",padding:"4px 0",borderBottom:"1px solid #EAF3DE"}},
            h("div",{className:"dot"}),
            h("span",{style:{fontSize:11,color:"#173404"}},e)
          )))
        ),
        h("div",{key:"inf"},
          h("div",{className:"sec-lbl"},"Información requerida"),
          h("div",{style:{display:"flex",flexDirection:"column",gap:2}},
            ...s.info.map((x,i)=>h("div",{key:i,style:{fontSize:11,color:"#3B6D11"}},"• "+x))
          )
        ),
        s.sub2&&s.sub2.map((ss,si)=>h("div",{key:"ss"+si},
          h("div",{className:"sec-lbl"},ss.t),
          ...ss.items.map((item,ii)=>h("div",{key:ii,className:"item-row",style:{flexDirection:"column",gap:2}},
            h("div",{style:{fontSize:11,fontWeight:500,color:"#27500A"}},item.l),
            h("div",{style:{fontSize:10,color:"#3B6D11",lineHeight:1.5}},item.d)
          ))
        ))
      ],
      tab==="tasks"&&[
        h("div",{key:"th",style:{fontSize:11,color:"#3B6D11"}},s.tasks.length+" tareas en esta etapa:"),
        ...s.tasks.map((t,i)=>h("div",{key:i,className:"item-row"},
          h("div",{style:{fontSize:11,fontWeight:500,color:"#3B6D11",minWidth:18}},i+1),
          h("span",{style:{fontSize:11,color:"#173404",lineHeight:1.5}},t)
        ))
      ],
      tab==="ai"&&h(AITab,{s,toggle,add,getSorted}),
      tab==="tools"&&[
        h("div",{key:"tl"},
          h("div",{className:"sec-lbl"},"Herramientas actuales"),
          h("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
            ...s.tools.map((t,i)=>h("span",{key:i,className:"pill"},t))
          )
        ),
        h("div",{key:"st"},
          h("div",{className:"sec-lbl"},"Dónde se guarda la información"),
          h("div",{className:"note",style:{fontWeight:500}},s.storage)
        ),
        h("div",{key:"rs"},
          h("div",{className:"sec-lbl"},"Responsables"),
          h("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
            ...s.resp.map((r,i)=>h("span",{key:i,className:"badge"},r))
          )
        )
      ]
    )
  );
}

function StageBtn({s,sel,onClick}){
  return h("div",{className:"stage-btn"+(sel?" active":""),onClick,style:{borderColor:sel?"#3B6D11":s.kind==="complete"?"#27500A":s.kind==="source"?"#97C459":s.kind==="status"?"#97C459":s.kind==="action"?"#C0DD97":s.kind==="declined"?"#97C459":s.kind==="hold"?"#C0DD97":"#C0DD97"}},
    h("div",{style:{fontSize:11,fontWeight:500,color:"#173404",lineHeight:1.3}},s.name),
    h("div",{style:{fontSize:10,color:"#3B6D11",lineHeight:1.3}},s.sub),
    h("div",{style:{fontSize:10,background:"#EAF3DE",color:"#27500A",padding:"2px 7px",borderRadius:10,border:"1px solid #C0DD97",fontWeight:500,alignSelf:"flex-start",marginTop:3}},s.ai.length+" IA →")
  );
}

function PipelineView(){
  const [flow,setFlow]=useState("investment");
  const [sel,setSel]=useState(null);
  const stages=flow==="investment"?iS:mS;
  const invT=useAITasks([...iS,...sS]);
  const monT=useAITasks(mS);
  const spT=useAITasks(sS);
  const aT=flow==="investment"?invT:monT;
  const isSpecial=sel&&sS.find(s=>s.id===sel.id);
  return h("div",{style:{display:"flex",flex:1,overflow:"hidden"}},
    h("div",{style:{flex:1,overflowX:"auto",overflowY:"auto",padding:"14px 20px"}},
      h("div",{style:{display:"flex",gap:7,marginBottom:12}},
        ...[["investment","Investment Pipeline (8 etapas)"],["monitoring","Portfolio Monitoring (3 etapas)"]].map(([id,lbl])=>
          h("button",{key:id,onClick:()=>{setFlow(id);setSel(null);},className:"cat-btn"+(flow===id?" on":"")},lbl)
        )
      ),
      h("div",{style:{display:"flex",alignItems:"center",width:"max-content"}},
        ...stages.map((s,i)=>h("div",{key:s.id,style:{display:"flex",alignItems:"center"}},
          h(StageBtn,{s,sel:sel?.id===s.id,onClick:()=>setSel(sel?.id===s.id?null:s)}),
          i<stages.length-1&&h("div",{style:{display:"flex",alignItems:"center",padding:"0 2px",flexShrink:0}},h(ArrowIcon))
        ))
      ),
      flow==="investment"&&h("div",{style:{marginTop:16,display:"flex",flexDirection:"column",gap:7}},
        h("div",{className:"sec-lbl"},"Estados especiales — pueden ocurrir desde cualquier etapa"),
        h("div",{style:{display:"flex",gap:10,alignItems:"flex-start"}},
          ...sS.map(s=>h(StageBtn,{key:s.id,s,sel:sel?.id===s.id,onClick:()=>setSel(sel?.id===s.id?null:s)})),
          h("div",{style:{padding:"9px 12px",background:"#EAF3DE",border:"1px solid #C0DD97",borderLeft:"3px solid #3B6D11",borderRadius:8,fontSize:11,color:"#27500A",alignSelf:"center",maxWidth:300,lineHeight:1.6}},
            h("span",{style:{fontWeight:500}},"Hold:")," follow-up cada 3–4 meses.",h("br"),
            h("span",{style:{fontWeight:500}},"Declined:")," documentar motivo siempre. Puede reactivarse."
          )
        )
      )
    ),
    sel&&h(Panel,{s:sel,onClose:()=>setSel(null),toggle:isSpecial?spT.toggle:aT.toggle,add:isSpecial?spT.add:aT.add,getSorted:isSpecial?spT.getSorted:aT.getSorted})
  );
}

function ConceptsView(){
  const [concepts,setConcepts]=useState(INIT_CONCEPTS);
  const [search,setSearch]=useState("");
  const [cat,setCat]=useState("Todos");
  const [newTerm,setNewTerm]=useState("");
  const [newDef,setNewDef]=useState("");
  const [newCat,setNewCat]=useState("Generales");
  const [nextId,setNextId]=useState(200);
  const allCats=["Todos",...[...new Set(concepts.map(c=>c.cat))].sort()];
  const filtered=concepts.filter(c=>{
    const mc=cat==="Todos"||c.cat===cat;
    const ms=!search||c.term.toLowerCase().includes(search.toLowerCase())||c.def.toLowerCase().includes(search.toLowerCase());
    return mc&&ms;
  }).sort((a,b)=>a.term.localeCompare(b.term));
  const add=()=>{
    if(!newTerm.trim()||!newDef.trim())return;
    setConcepts(p=>[...p,{id:nextId,term:newTerm.trim(),cat:newCat,def:newDef.trim()}]);
    setNextId(n=>n+1);setNewTerm("");setNewDef("");
  };
  const del=id=>setConcepts(p=>p.filter(c=>c.id!==id));
  return h("div",{style:{flex:1,overflowY:"auto",padding:"16px 22px",display:"flex",flexDirection:"column",gap:14}},
    h("input",{className:"search-inp",placeholder:"Buscar concepto o definición...",value:search,onChange:e=>setSearch(e.target.value)}),
    h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
      ...allCats.map(c=>h("button",{key:c,className:"cat-btn"+(cat===c?" on":""),onClick:()=>setCat(c)},c))
    ),
    h("div",{style:{fontSize:11,color:"#639922"}},filtered.length+" conceptos"),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}},
      ...filtered.map(c=>h("div",{key:c.id,className:"concept-card"},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}},
          h("div",{style:{fontSize:13,fontWeight:500,color:"#173404"}},c.term),
          h("button",{className:"del-btn",onClick:()=>del(c.id)},"×")
        ),
        h("span",{className:"concept-tag"},c.cat),
        h("div",{style:{fontSize:11,color:"#3B6D11",lineHeight:1.6,marginTop:4}},c.def)
      ))
    ),
    h("div",{style:{background:"#EAF3DE",border:"1.5px solid #C0DD97",borderRadius:10,padding:"14px 16px",display:"flex",flexDirection:"column",gap:8,marginTop:4}},
      h("div",{className:"sec-lbl"},"Agregar nuevo concepto"),
      h("div",{style:{display:"flex",gap:8}},
        h("input",{className:"add-inp",style:{flex:2},placeholder:"Término (ej: ARR)",value:newTerm,onChange:e=>setNewTerm(e.target.value)}),
        h("select",{value:newCat,onChange:e=>setNewCat(e.target.value),style:{border:"1px solid #C0DD97",borderRadius:7,padding:"6px 9px",fontSize:11,color:"#27500A",background:"#fff",outline:"none",fontFamily:"inherit"}},
          ...["Generales","SaaS","Fintech","Marketplace","Inversión","Mercado","Legal","Ecosistema","Operaciones","Logística"].map(c=>h("option",{key:c,value:c},c))
        )
      ),
      h("textarea",{value:newDef,onChange:e=>setNewDef(e.target.value),placeholder:"Definición clara y concisa...",style:{border:"1px solid #C0DD97",borderRadius:7,padding:"7px 10px",fontSize:11,color:"#27500A",background:"#fff",outline:"none",resize:"vertical",minHeight:60,fontFamily:"inherit"}}),
      h("button",{className:"add-btn",style:{alignSelf:"flex-start"},onClick:add},"+ Agregar concepto")
    )
  );
}

function ToolsView(){
  const [open,setOpen]=useState(null);
  const cats=[...new Set(TOOLS.map(t=>t.cat))];
  return h("div",{style:{flex:1,overflowY:"auto",padding:"16px 22px",display:"flex",flexDirection:"column",gap:14}},
    h("div",{style:{fontSize:12,color:"#3B6D11"}},"Herramientas que usa el equipo Tantauco. Haz clic en cualquiera para ver más detalles."),
    ...cats.map(cat=>h("div",{key:cat},
      h("div",{className:"sec-lbl",style:{marginBottom:8}},cat),
      h("div",{style:{display:"flex",flexDirection:"column",gap:7}},
        ...TOOLS.filter(t=>t.cat===cat).map(t=>h("div",{key:t.id,className:"tool-card"+(open===t.id?" open":""),onClick:()=>setOpen(open===t.id?null:t.id)},
          h("div",{style:{display:"flex",alignItems:"center",gap:8}},
            h("span",{style:{fontSize:20,lineHeight:1}},t.icon),
            h("div",{style:{flex:1}},
              h("div",{style:{fontSize:12,fontWeight:500,color:"#173404"}},t.name),
              h("div",{style:{fontSize:11,color:"#3B6D11",marginTop:1}},t.desc)
            ),
            h(ChevronRight,{open:open===t.id})
          ),
          open===t.id&&h("div",{style:{display:"flex",flexDirection:"column",gap:10,marginTop:8,borderTop:"1px solid #C0DD97",paddingTop:8}},
            h("div",null,
              h("div",{className:"sec-lbl"},"¿Para qué lo usamos?"),
              h("div",{style:{fontSize:11,color:"#173404",lineHeight:1.6}},t.uso)
            ),
            h("div",null,
              h("div",{className:"sec-lbl"},"Funciones principales"),
              h("div",{style:{display:"flex",flexDirection:"column",gap:4}},
                ...t.features.map((f,i)=>h("div",{key:i,style:{display:"flex",gap:7,alignItems:"flex-start"}},
                  h("div",{className:"dot",style:{marginTop:4}}),
                  h("span",{style:{fontSize:11,color:"#3B6D11",lineHeight:1.5}},f)
                ))
              )
            )
          )
        ))
      )
    ))
  );
}

function App(){
  const [section,setSection]=useState("pipeline");
  const navs=[["pipeline","Proceso de inversión"],["concepts","Conceptos útiles"],["tools","Herramientas"]];
  return h("div",{style:{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",background:"#fff"}},
    h("div",{style:{padding:"10px 20px 0",borderBottom:"1.5px solid #C0DD97",flexShrink:0,background:"#fff"}},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}},
        h("div",null,
          h("div",{style:{fontSize:15,fontWeight:500,color:"#173404"}},"Tantauco VC · Manual de Operaciones"),
          h("div",{style:{fontSize:11,color:"#3B6D11",marginTop:1}},"Proceso de inversión · Portfolio Monitoring · Conceptos · Herramientas")
        ),
        h("div",{style:{display:"flex",gap:6,alignItems:"center"}},
          ...[{c:"#97C459",l:"Fuente / Estado"},{c:"#3B6D11",l:"Acción"},{c:"#27500A",l:"Completado"}].map(x=>
            h("div",{key:x.l,style:{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#3B6D11"}},
              h("div",{style:{width:8,height:8,background:x.c+"25",border:"1.5px solid "+x.c,borderRadius:2}}),
              x.l
            )
          )
        )
      ),
      h("div",{style:{display:"flex",gap:0,marginTop:8}},
        ...navs.map(([id,lbl])=>h("button",{key:id,className:"nav-btn"+(section===id?" on":""),onClick:()=>setSection(id)},lbl))
      )
    ),
    section==="pipeline"&&h(PipelineView),
    section==="concepts"&&h(ConceptsView),
    section==="tools"&&h(ToolsView)
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(h(App,null));
</script>
</body>
</html>
