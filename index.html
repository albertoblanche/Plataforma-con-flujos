<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tantauco VC · Manual de Operaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════
   DESIGN TOKENS — Tantauco Bootcamp palette
══════════════════════════════════════════════════════ */
:root{
  --cream:   #F2EDE3;
  --cream2:  #EAE4D8;
  --dark:    #1C3A2A;
  --dark2:   #142D20;
  --green:   #2D5A3D;
  --green2:  #3B6D11;
  --gold:    #C9A84C;
  --gold2:   #B8972E;
  --text:    #1C3A2A;
  --text2:   #4A6355;
  --text3:   #7A9585;
  --border:  #D5CCBB;
  --border2: #C4BAA8;
  --white:   #FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:var(--text)}
::-webkit-scrollbar{height:5px;width:5px}
::-webkit-scrollbar-thumb{background:var(--green);border-radius:3px;opacity:0.5}
::-webkit-scrollbar-track{background:var(--cream2)}

/* ══════════════════════════════════════════════════════
   LANDING
══════════════════════════════════════════════════════ */
#landing{height:100vh;overflow-y:auto;background:var(--cream);display:flex;flex-direction:column}

.hero{
  background:var(--dark);
  padding:60px 72px 56px;
  display:flex;flex-direction:column;gap:16px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:"";position:absolute;right:-80px;top:-80px;
  width:420px;height:420px;border-radius:50%;
  background:rgba(255,255,255,0.04);
}
.hero::after{
  content:"";position:absolute;right:120px;bottom:-120px;
  width:280px;height:280px;border-radius:50%;
  background:rgba(255,255,255,0.025);
}
.hero-ey{
  font-size:11px;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--gold);font-weight:500;
}
.hero-t{
  font-family:'Playfair Display',serif;
  font-size:58px;line-height:1.02;color:var(--cream);font-weight:400;
  max-width:640px;
}
.hero-t em{color:var(--gold);font-style:italic}
.hero-s{
  font-size:16px;color:rgba(242,237,227,0.65);
  font-weight:300;max-width:520px;line-height:1.7;
}
.hero-chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.chip{
  font-size:11px;color:rgba(242,237,227,0.8);
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;padding:5px 14px;
  display:flex;align-items:center;gap:6px;
}
.chip::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--gold)}

/* MAIN CARDS */
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:40px 72px}
.mc{
  border-radius:16px;border:1.5px solid var(--border);
  cursor:pointer;transition:all 0.22s;overflow:hidden;
  position:relative;background:var(--white);
}
.mc:hover{border-color:var(--green);transform:translateY(-3px);box-shadow:0 12px 40px rgba(28,58,42,0.12)}
.mc:hover .mc-arr{opacity:1;transform:translateX(0)}
.mc-bar{height:3px;background:linear-gradient(90deg,var(--dark),var(--green))}
.mc-b{padding:32px 34px 36px}
.mc-n{
  font-family:'Playfair Display',serif;
  font-size:54px;color:var(--cream2);line-height:1;margin-bottom:16px;
}
.mc-lbl{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-weight:500}
.mc-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;color:var(--dark);margin-bottom:10px;line-height:1.15}
.mc-desc{font-size:14px;color:var(--text2);line-height:1.7;font-weight:300}
.mc-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:20px}
.mc-pill{font-size:11px;padding:4px 11px;border-radius:20px;background:var(--cream2);border:1px solid var(--border);color:var(--text2)}
.mc-arr{
  position:absolute;bottom:28px;right:28px;width:40px;height:40px;
  border-radius:50%;background:var(--dark);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateX(-10px);transition:all 0.22s;
}

/* SECONDARY */
.sec-section{padding:0 72px 52px;display:flex;flex-direction:column;gap:18px}
.sec-div{
  font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--text3);display:flex;align-items:center;gap:14px;
}
.sec-div::after{content:"";flex:1;height:1px;background:var(--border)}
.sec-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sc{
  border-radius:12px;border:1.5px solid var(--border);
  cursor:pointer;transition:all 0.18s;background:var(--white);
  padding:22px 24px;display:flex;gap:16px;align-items:flex-start;
}
.sc:hover{border-color:var(--green);background:var(--cream);box-shadow:0 4px 16px rgba(28,58,42,0.07)}
.sc-icon{
  width:44px;height:44px;border-radius:10px;
  background:var(--cream2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.sc-t{font-family:'Playfair Display',serif;font-size:17px;color:var(--dark);margin-bottom:5px;font-weight:400}
.sc-d{font-size:12px;color:var(--text2);line-height:1.6;font-weight:300}

/* ══════════════════════════════════════════════════════
   FULL PIPELINE VIEW
══════════════════════════════════════════════════════ */
#fullview{position:fixed;inset:0;background:var(--cream);display:flex;flex-direction:column;z-index:100}
.fv-top{
  padding:0 24px;border-bottom:1.5px solid var(--border);
  background:var(--white);flex-shrink:0;display:flex;align-items:stretch;
}
.fv-back{
  display:flex;align-items:center;gap:8px;
  padding:16px 20px 14px 0;margin-right:20px;
  border-right:1.5px solid var(--cream2);
  cursor:pointer;color:var(--green);font-size:13px;
  border-top:none;border-bottom:none;border-left:none;
  background:none;font-family:inherit;transition:color 0.1s;
}
.fv-back:hover{color:var(--dark)}
.fv-info{padding:14px 0 12px;flex:1}
.fv-ttl{font-family:'Playfair Display',serif;font-size:22px;color:var(--dark);font-weight:400}
.fv-sub{font-size:12px;color:var(--text3);margin-top:3px}

/* FLOW AREA */
.flow-wrap{display:flex;flex:1;overflow:hidden}
.flow-scroll{flex:1;overflow-x:auto;overflow-y:auto;padding:28px 28px 28px}

/* STAGE CARDS — larger */
.stages-row{display:flex;align-items:flex-start;flex-wrap:wrap;gap:16px;width:100%}
.sb{
  width:180px;min-width:180px;
  padding:16px 16px 14px;border-radius:12px;
  cursor:pointer;border:1.5px solid var(--border);
  background:var(--white);display:flex;flex-direction:column;gap:6px;
  transition:all 0.16s;text-align:left;
  box-shadow:0 2px 8px rgba(28,58,42,0.04);
}
.sb:hover{border-color:var(--green);background:var(--cream);box-shadow:0 4px 16px rgba(28,58,42,0.1)}
.sb.on{border-color:var(--dark);background:var(--cream);box-shadow:0 0 0 3px rgba(28,58,42,0.1)}
.sb-kind{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:2px}
.sb-n{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;color:var(--dark);line-height:1.2}
.sb-s{font-size:11px;color:var(--text2);line-height:1.4;margin-top:2px}
.sb-ai{
  font-size:10px;background:var(--cream2);color:var(--text2);
  padding:3px 8px;border-radius:20px;border:1px solid var(--border);
  font-weight:500;align-self:flex-start;margin-top:4px;
}
.arr-wrap{display:flex;align-items:center;padding:0 4px;flex-shrink:0;align-self:center;margin-top:-4px}

/* SPECIALS */
.sp-section{margin-top:24px;display:flex;flex-direction:column;gap:12px}
.sp-lbl{font-size:10px;font-weight:500;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em}
.sp-cards{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.sp-note{
  padding:12px 16px;background:var(--dark);border-radius:10px;
  font-size:12px;color:rgba(242,237,227,0.85);max-width:320px;line-height:1.6;
  align-self:center;
}
.sp-note strong{color:var(--gold)}

/* ══════════════════════════════════════════════════════
   DETAIL PANEL
══════════════════════════════════════════════════════ */
.dp{
  width:400px;min-width:400px;
  border-left:1.5px solid var(--border);
  background:var(--white);display:flex;flex-direction:column;
  height:100%;
}
.dp-h{
  padding:18px 18px 14px;
  border-bottom:1.5px solid var(--border);
  background:var(--dark);flex-shrink:0;
}
.dp-n{font-family:'Playfair Display',serif;font-size:20px;color:var(--cream);font-weight:400}
.dp-su{font-size:12px;color:rgba(242,237,227,0.6);margin-top:3px}
.dp-x{
  background:none;border:none;cursor:pointer;
  font-size:22px;color:rgba(242,237,227,0.5);
  padding:0;font-family:inherit;line-height:1;
  transition:color 0.1s;
}
.dp-x:hover{color:var(--cream)}
.dp-badges{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
.dp-badge{
  font-size:10px;padding:3px 10px;border-radius:20px;
  background:rgba(201,168,76,0.2);border:1px solid rgba(201,168,76,0.4);
  color:var(--gold);font-weight:500;white-space:nowrap;
}
.dp-tabs{display:flex;border-bottom:1.5px solid var(--border);flex-shrink:0;background:var(--cream)}
.dt{
  flex:1;padding:10px 4px;font-size:11px;background:none;
  border:none;border-bottom:2px solid transparent;
  cursor:pointer;color:var(--text3);font-family:inherit;transition:all 0.12s;
}
.dt.on{color:var(--dark);border-bottom-color:var(--dark);font-weight:500}
.dt:hover{color:var(--green)}
.dp-body{padding:16px 18px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px}

/* ══════════════════════════════════════════════════════
   SHARED COMPONENTS
══════════════════════════════════════════════════════ */
.badge{font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--cream2);color:var(--text2);font-weight:500;white-space:nowrap}
.pill{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--cream2);color:var(--text2)}
.slbl{font-size:10px;font-weight:500;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:7px}
.irow{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:9px;background:var(--cream);border:1px solid var(--border)}
.dot{width:6px;height:6px;min-width:6px;border-radius:50%;background:var(--green);margin-top:5px;flex-shrink:0}
.nbox{padding:10px 14px;background:var(--cream);border:1px solid var(--border2);border-left:3px solid var(--dark);border-radius:8px;font-size:12px;color:var(--text2);line-height:1.6}
.ccat{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;transition:all 0.1s}
.ccat.on{background:var(--dark);color:var(--cream);border-color:var(--dark)}
.ccat:hover{border-color:var(--green)}
.sinp{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px 14px;font-size:13px;outline:none;background:var(--white);color:var(--text);font-family:inherit}
.sinp:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(45,90,61,0.1)}
.sinp::placeholder{color:var(--text3)}
.ainp{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;outline:none;background:var(--white);color:var(--text);font-family:inherit}
.ainp:focus{border-color:var(--green)}
.ainp::placeholder{color:var(--text3)}
.abtn{background:var(--dark);color:var(--cream);border:none;border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;font-weight:500;font-family:inherit;transition:background 0.1s}
.abtn:hover{background:var(--dark2)}
.dbtn{background:none;border:none;cursor:pointer;color:var(--border2);font-size:16px;padding:0 4px;line-height:1;flex-shrink:0;transition:color 0.1s}
.dbtn:hover{color:#c0392b}
.crow{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:8px;cursor:pointer;border:1.5px solid var(--border);background:var(--white);transition:all 0.12s}
.crow:hover{background:var(--cream);border-color:var(--green)}
.crow.done{background:var(--cream);opacity:0.6}
.cbox{width:17px;height:17px;min-width:17px;border-radius:5px;border:1.5px solid var(--border2);background:var(--white);display:flex;align-items:center;justify-content:center;margin-top:1px;flex-shrink:0;transition:all 0.12s}
.cbox.on{background:var(--dark);border-color:var(--dark)}
.conc{background:var(--white);border:1.5px solid var(--border);border-radius:11px;padding:14px 16px;display:flex;flex-direction:column;gap:6px;transition:border-color 0.12s}
.conc:hover{border-color:var(--green)}
.ctag{font-size:10px;padding:3px 9px;border-radius:20px;background:var(--cream2);border:1px solid var(--border);color:var(--text2);align-self:flex-start}
.tcrd{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all 0.12s;margin-bottom:10px}
.tcrd:hover{border-color:var(--green);box-shadow:0 4px 14px rgba(28,58,42,0.07)}
.tcrd.open{border-color:var(--dark);background:var(--cream)}
.arow{display:flex;gap:8px;align-items:center}
#secpage{position:fixed;inset:0;background:var(--cream);display:flex;flex-direction:column;z-index:100}
.sph{padding:16px 28px;border-bottom:1.5px solid var(--border);background:var(--dark);flex-shrink:0;display:flex;align-items:center;gap:16px}
.spback{background:none;border:none;cursor:pointer;color:rgba(242,237,227,0.7);font-size:13px;font-family:inherit;display:flex;align-items:center;gap:7px;transition:color 0.1s}
.spback:hover{color:var(--cream)}
.sptitle{font-family:'Playfair Display',serif;font-size:22px;color:var(--cream);font-weight:400}
.spbody{flex:1;overflow-y:auto;padding:28px 36px;display:flex;flex-direction:column;gap:20px}

/* ══════════════════════════════════════════════════════
   AI CHECKLIST
══════════════════════════════════════════════════════ */
.ai-prog{padding:10px 14px;background:var(--dark);border-radius:8px;display:flex;gap:10px;align-items:center;margin-bottom:4px}
.ai-prog-bar{height:4px;background:rgba(255,255,255,0.2);border-radius:2px;overflow:hidden;width:80px}
.ai-prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.3s}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,createElement:h}=React;

const TOOLS=[
{id:"plataforma",name:"Plataforma Tantauco",icon:"🏢",cat:"Gestión interna",desc:"CRM/ERP diseñado para el proceso de inversión y monitoreo de Tantauco VC. Fuente de verdad central del fondo.",uso:"Registrar y seguir cada startup en el pipeline, documentar reuniones, métricas, decisiones y toda la información del proceso de inversión y portfolio.",features:["Pipeline de inversión con 8 etapas oficiales","Registro de reuniones con transcripciones y notas","Overview de cada startup (campos obligatorios para Screening)","Seguimiento de portfolio con métricas y KPIs","Estados especiales: Hold y Declined","Registro de intros a fondos e intros B2B"]},
{id:"harmonic",name:"Harmonic",icon:"🔍",cat:"Deal flow",desc:"Plataforma de inteligencia de startups para buscar, filtrar y obtener información detallada a nivel global.",uso:"Búsqueda activa de startups con thesis fit, obtención de correos de founders y uso del modo GPT para queries en lenguaje natural.",features:["Búsqueda avanzada por país, sector, etapa y métricas","GPT mode: búsqueda en lenguaje natural","Extracción de correos electrónicos de founders","Datos de financiamiento, equipo e inversores","Alertas de rondas y actualizaciones de startups"]},
{id:"granola",name:"Granola",icon:"🎙️",cat:"Reuniones",desc:"Herramienta de transcripción y notas de reuniones con IA. Graba, transcribe y genera resúmenes automáticamente.",uso:"Transcribir todas las reuniones con founders y del equipo. El analista es responsable de verificar que Granola esté activo en cada reunión.",features:["Transcripción automática en tiempo real","Resumen post-reunión con puntos clave y action items","Compatible con Google Meet","Historial de reuniones accesible para el equipo","Insumo principal para auto-rellenado de Plataforma Tantauco (pendiente)"]},
{id:"notion",name:"Notion",icon:"📝",cat:"Documentación",desc:"Documentación y gestión del conocimiento. En Tantauco se usa para los Investment Memos y documentación interna.",uso:"Redacción de Investment Memos, carpeta de memos anteriores, template de memos y propuesta de valor del portfolio.",features:["Carpeta de Investment Memos con todos los memos anteriores","Template estándar para redacción de nuevos memos","Portal de recursos del portfolio (en construcción)","Documentación interna del fondo"]},
{id:"gmail",name:"Gmail",icon:"📧",cat:"Comunicación",desc:"Principal canal de comunicación con founders, otros fondos y el ecosistema.",uso:"Contacto en frío con founders, envío de formularios, comunicación durante el proceso de inversión y onboarding del portfolio.",features:["Templates de contacto en frío por sector y etapa","Seguimiento de respuestas y follow-ups","Comunicación con founders durante todo el pipeline","Envío de onboarding email, Founder form y Quarterly form"]},
{id:"claude",name:"Claude (Anthropic)",icon:"✦",cat:"Inteligencia Artificial",desc:"Asistente de IA avanzado de Anthropic. Modelo de IA principal del equipo Tantauco.",uso:"Análisis de documentos, redacción de memos, research de mercados, automatización de flujos con Claude Cowork.",features:["Análisis y resumen de documentos (Data Room, transcripciones)","Apoyo en la redacción del Investment Memo","Research de mercados y benchmarks de industria","Claude Cowork: automatización de flujos del equipo","Créditos disponibles para startups del portfolio"]},
{id:"chatgpt",name:"ChatGPT (OpenAI)",icon:"🤖",cat:"Inteligencia Artificial",desc:"Asistente de IA de OpenAI. Herramienta de uso general para análisis, redacción e investigación.",uso:"Apoyo complementario en tareas de análisis, generación de contenido e investigación de startups y mercados.",features:["Generación de textos y análisis generales","Research de mercados e industrias","Búsqueda web en tiempo real (ChatGPT con browsing)","Creación de imágenes y contenido visual"]},
{id:"gemini",name:"Gemini (Google)",icon:"💎",cat:"Inteligencia Artificial",desc:"Asistente de IA de Google con integración nativa al ecosistema Google Workspace.",uso:"Apoyo complementario en análisis y redacción, especialmente útil por su integración con Gmail, Drive y Docs.",features:["Integración nativa con Gmail, Google Drive y Google Docs","Research de mercados con acceso a Google Search","Análisis de documentos de Drive directamente"]},
];

const CONCEPTS=[
{id:1,term:"SAFE",cat:"Inversión",def:"Simple Agreement for Future Equity. Acuerdo de inversión que permite a las startups obtener capital ahora con la promesa de dar acciones en una ronda futura. Creado por Y Combinator."},
{id:2,term:"MOIC",cat:"Generales",def:"Multiple on Invested Capital. Mide cuántas veces se multiplicó el capital invertido. Ej: MOIC de 3x significa que se recuperó 3 veces lo invertido."},
{id:3,term:"IRR",cat:"Generales",def:"Internal Rate of Return. Mide la rentabilidad anualizada de una inversión considerando el tiempo en que se obtuvo el retorno."},
{id:4,term:"ARR",cat:"SaaS",def:"Annual Recurring Revenue. Ingresos recurrentes anuales de una empresa SaaS. Métrica central para evaluar el tamaño y crecimiento de un negocio de suscripción."},
{id:5,term:"MRR",cat:"SaaS",def:"Monthly Recurring Revenue. Ingresos recurrentes mensuales. ARR = MRR x 12."},
{id:6,term:"GTM",cat:"Generales",def:"Go-to-Market. Estrategia que define cómo una empresa llevará su producto al mercado y llegará a sus clientes objetivo."},
{id:7,term:"PMF",cat:"Generales",def:"Product-Market Fit. El punto donde el producto satisface una necesidad real del mercado generando tracción orgánica y retención."},
{id:8,term:"TAM",cat:"Mercado",def:"Total Addressable Market. El mercado total disponible si se captura el 100% de los clientes potenciales."},
{id:9,term:"SAM",cat:"Mercado",def:"Serviceable Available Market. La parte del TAM que la empresa puede alcanzar con su modelo de negocio y geografía actuales."},
{id:10,term:"SOM",cat:"Mercado",def:"Serviceable Obtainable Market. La porción del SAM que la empresa puede capturar de forma realista en el corto/mediano plazo."},
{id:11,term:"TTV",cat:"SaaS",def:"Time to Value. Tiempo que tarda un cliente en experimentar el valor prometido del producto."},
{id:12,term:"Lead Investor",cat:"Inversión",def:"Inversor principal que aporta el mayor capital y negocia todos los términos de una ronda. Actúa como ancla de confianza."},
{id:13,term:"Cap Table",cat:"Inversión",def:"Tabla de capitalización. Muestra la estructura de propiedad: quién posee qué porcentaje de acciones y a qué precio."},
{id:14,term:"CAC",cat:"SaaS",def:"Customer Acquisition Cost. Costo promedio de adquirir un nuevo cliente, incluyendo marketing y ventas."},
{id:15,term:"Aceleradora",cat:"Ecosistema",def:"Organización que proporciona capital semilla, mentoría y redes de contacto para startups en etapa temprana durante 3 a 6 meses. Ej: YC, Platanus, StartupChile."},
{id:16,term:"Burn Rate",cat:"Generales",def:"Cuánto dinero en efectivo gasta una startup cada mes. Net Burn = Gasto total mensual menos los ingresos mensuales."},
{id:17,term:"Notas Convertibles",cat:"Inversión",def:"Instrumentos de deuda que se convierten en acciones en una futura ronda, generalmente con un descuento o valuation cap."},
{id:18,term:"Vesting",cat:"Inversión",def:"Proceso por el cual los founders o empleados adquieren progresivamente el derecho de propiedad sobre sus acciones a lo largo del tiempo."},
{id:19,term:"Cliff",cat:"Inversión",def:"Período mínimo que debes trabajar antes de recibir cualquier acción. Ejemplo: cliff de 1 año — al mes 12, recibes todo lo acumulado."},
{id:20,term:"ESOP",cat:"Inversión",def:"Employee Stock Option Plan. Plan que otorga a los empleados el derecho a comprar acciones a un precio fijo (strike price) en el futuro."},
{id:21,term:"Pro-rata Rights",cat:"Inversión",def:"Derecho del inversor a participar en rondas futuras manteniendo su porcentaje de participación para no diluirse."},
{id:22,term:"Liquidation Preference",cat:"Inversión",def:"En caso de venta de la empresa, los inversores cobran antes que los empleados y founders."},
{id:23,term:"ROFR",cat:"Inversión",def:"Right of First Refusal. Derecho contractual de prioridad para comprar un activo antes de que se venda a un tercero."},
{id:24,term:"LPA",cat:"Inversión",def:"Limited Partnership Agreement. Contrato que regula la relación entre los LPs (inversores del fondo) y el GP (quien gestiona el fondo)."},
{id:25,term:"Cayman Sandwich",cat:"Legal",def:"Estructura legal de tres capas para startups latinoamericanas: holding en Islas Caiman, LLC en Delaware y sociedad operativa en LATAM."},
{id:26,term:"Moat",cat:"Generales",def:"Ventaja competitiva sostenible. Hace difícil que los competidores repliquen el negocio."},
{id:27,term:"White-label",cat:"Generales",def:"Producto fabricado por una empresa y vendido a otra, que lo renombra y comercializa bajo su propia marca."},
{id:28,term:"Escrow",cat:"Legal",def:"Depósito en garantía. Tercero neutro que guarda fondos o documentos hasta que se cumplan las condiciones acordadas."},
{id:29,term:"Take Rate",cat:"Marketplace",def:"Porcentaje de ingresos que una plataforma se queda de cada transacción que facilita."},
{id:30,term:"GMV",cat:"Marketplace",def:"Gross Merchandise Value. Valor total de todos los bienes vendidos en una plataforma antes de restar gastos o devoluciones."},
{id:31,term:"ARPU",cat:"SaaS",def:"Average Revenue Per User. Ingreso promedio por usuario."},
{id:32,term:"ARPA",cat:"SaaS",def:"Average Revenue Per Account. Ingreso promedio por cuenta (empresa), usado en modelos B2B."},
{id:33,term:"KYC",cat:"Fintech",def:"Know Your Customer. Proceso de verificación de identidad requerido por regulaciones financieras."},
{id:34,term:"Open Banking",cat:"Fintech",def:"Sistema que permite a terceros autorizados acceder de forma segura a la información bancaria mediante APIs."},
{id:35,term:"Embedded Finance",cat:"Fintech",def:"Integración de servicios financieros directamente dentro de productos de empresas no financieras."},
{id:36,term:"Stablecoins",cat:"Fintech",def:"Criptomonedas diseñadas para tener valor estable, vinculando su precio a un activo externo como el dólar."},
{id:37,term:"ROAS",cat:"Generales",def:"Return on Advertising Spend. Cuánto ingreso genera cada peso/dólar invertido en publicidad."},
{id:38,term:"Moral Hazard",cat:"Generales",def:"Riesgo moral. Ocurre cuando alguien asume más riesgos porque otra entidad asumirá las consecuencias negativas."},
{id:39,term:"Scrum / Kanban",cat:"Operaciones",def:"Scrum: marco ágil con sprints. Kanban: metodología visual con tableros que limita las tareas en curso."},
{id:40,term:"PUDO",cat:"Logística",def:"Pick-Up and Drop-Off. Punto donde los clientes recogen o dejan paquetes."},

function useAITasks(all){
  const init={};
  all.forEach(s=>{init[s.id]=s.ai.map(t=>({text:t,done:false}));});
  const [tasks,setT]=useState(init);
  const toggle=(sid,i)=>setT(p=>{const a=[...(p[sid]||[])];a[i]={...a[i],done:!a[i].done};return{...p,[sid]:a};});
  const add=(sid,txt)=>{if(!txt.trim())return;setT(p=>({...p,[sid]:[...(p[sid]||[]),{text:txt.trim(),done:false}]}));};
  const getSorted=sid=>{const a=(tasks[sid]||[]).map((t,i)=>({...t,i}));return[...a.filter(t=>!t.done),...a.filter(t=>t.done)];};
  return{toggle,add,getSorted};
}

/* AITab */
function AITab({s,toggle,add,getSorted}){
  const [nT,setNT]=useState("");
  const sorted=getSorted(s.id);
  const done=sorted.filter(t=>t.done).length;
  const tot=sorted.length;
  const pct=tot>0?Math.round(done/tot*100):0;
  const sub=()=>{if(nT.trim()){add(s.id,nT);setNT("");}};
  return h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
    tot>0&&h("div",{className:"ai-prog"},
      h("span",{style:{flex:1,fontSize:12,color:"rgba(242,237,227,0.85)",fontWeight:500}},tot+" tareas · "+done+"/"+tot+" completadas"),
      h("div",{className:"ai-prog-bar"},h("div",{className:"ai-prog-fill",style:{width:pct+"%"}})),
      h("span",{style:{fontSize:11,color:"#C9A84C",fontWeight:500,minWidth:32}},pct+"%")

      h("input",{className:"ainp",placeholder:"Agregar nueva tarea de automatización...",value:nT,onChange:e=>setNT(e.target.value),onKeyDown:e=>{if(e.key==="Enter")sub();}}),

    ...sorted.filter(t=>!t.done).map(t=>h("div",{key:t.i,className:"crow",onClick:()=>toggle(s.id,t.i)},
      h("div",{className:"cbox"}),h("span",{style:{fontSize:12,color:"#1C3A2A",lineHeight:1.6}},t.text)
    )),
    done>0&&h("div",{className:"slbl",style:{marginTop:4}},"Completadas ("+done+")"),
    ...sorted.filter(t=>t.done).map(t=>h("div",{key:t.i,className:"crow done",onClick:()=>toggle(s.id,t.i)},

    )),

/* App */
function App(){
  const [view,setView]=useState("landing");
  if(view==="landing") return h(Landing,{onNav:setView});
  if(view==="investment") return h(PFV,{flow:"investment",onBack:()=>setView("landing")});
  if(view==="monitoring") return h(PFV,{flow:"monitoring",onBack:()=>setView("landing")});
  if(view==="concepts") return h(ConceptsPage,{onBack:()=>setView("landing")});
  if(view==="tools") return h(ToolsPage,{onBack:()=>setView("landing")});
  return null;
}

ReactDOM.createRoot(document.getElementById("app")).render(h(App,null));
</script>
